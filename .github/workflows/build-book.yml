name: Build Book PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          gem install asciidoctor-pdf
          pip install pillow

      - name: Build book PDF
        run: |
          asciidoctor-pdf \
            -a pdf-theme=yeshu-theme.yml \
            -a pdf-themesdir=themes \
            book.adoc \
            -o yeshu-min-natzrat.pdf \
            --trace -v

      - name: Build cover PDF
        run: python scripts/create_cover.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yeshu-min-natzrat
          path: |
            yeshu-min-natzrat.pdf
            cover/cover.pdf
            cover/cover.png

      - name: Get version
        id: version
        run: |
          VERSION=$(grep ':version:' book.adoc | sed 's/:version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create or update release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Delete existing release/tag if it exists
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git tag -d "$VERSION" 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true
          # Create new release
          gh release create "$VERSION" \
            --title "Yeshu min Natzrat $VERSION" \
            --notes "PDF build from $(git rev-parse --short HEAD)" \
            --latest \
            yeshu-min-natzrat.pdf \
            cover/cover.pdf
